name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:

  build:

    runs-on: self-hosted

    steps:
    - name: Pull Docker image
      run: sudo docker pull PaballoStevens/takealotclone:latest
    - name: Delete Old docker container
      run: sudo docker rm -f takealotclone-container || true
    - name: Run Docker Container
      run: sudo docker run -d -p 3000:3000 --name takealotclone-container paballostevens/takealotclone